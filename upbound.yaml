apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: helm-opensearch
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: ">=v1"
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.1'
  description: Installs the OpenSearch Helm chart with a minimal, stable interface.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # helm-opensearch

    Installs the OpenSearch Helm chart using Crossplane and the Helm provider.
  repository: ghcr.io/hops-ops/helm-opensearch
  source: github.com/hops-ops/helm-opensearch
